name: Conduit API Tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      mongodb:
        image: mongo:6
        ports:
          - 27017:27017

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install server dependencies
        run: npm install

      - name: Start Conduit server
        run: node app.js &
        env:
          MONGODB_URI: mongodb://127.0.0.1:27017/conduit

      - name: Wait for server to be ready
        run: |
          for i in $(seq 1 15); do
            curl -sf http://localhost:3000/api/tags && break
            echo "Waiting... ($i)"
            sleep 2
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install test dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        env:
          CONDUIT_BASE_URL: http://localhost:3000/api
        run: pytest tests/ -v --tb=short